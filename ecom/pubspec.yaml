name: flutter_ecommerce_firebase
description: A complete production-ready e-commerce app with Firebase.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  provider: ^6.1.1
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.6
  carousel_slider: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
